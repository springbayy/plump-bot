<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plump</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="setup" class="setup">
        <div>
          <p class="eyebrow">Plump</p>
          <h1>Play Plump</h1>
        </div>
        <form id="setup-form" class="setup-grid">
          <label>
            Game type
            <select name="mode" id="game-mode">
              <option value="round">Single round</option>
              <option value="game" selected>Full game</option>
            </select>
          </label>
          <label>
            Opponents
            <select name="opponents" id="opponents">
              <option value="2">2 opponents</option>
              <option value="3" selected>3 opponents</option>
              <option value="4">4 opponents</option>
            </select>
          </label>
          <label id="single-round-field" class="hidden">
            Cards this round
            <input name="hand_size" id="hand-size" type="number" min="3" max="10" value="5" />
          </label>
          <label id="maximum-round-field">
            Highest round
            <input name="max_hand_size" id="max-hand-size" type="number" min="5" max="10" value="10" />
          </label>
          <label id="minimum-round-field">
            Lowest round
            <input name="min_hand_size" id="min-hand-size" type="number" min="3" max="9" value="3" />
          </label>
          <label>
            Your first-round bid order
            <select name="bid_position" id="bid-position"></select>
          </label>
          <label>
            Seed
            <input name="seed" type="number" placeholder="random" />
          </label>
          <label class="checkbox-field probability-toggle">
            <input name="show_probabilities" id="show-probabilities" type="checkbox" checked />
            <span><strong>Show action probabilities</strong><small>Display the model's decimal probability on every legal bid and card.</small></span>
          </label>
          <button id="start-button" class="primary" type="submit">Start Full Game</button>
        </form>
      </section>

      <section id="table" class="table hidden">
        <header class="topbar">
          <div>
            <p id="round-eyebrow" class="eyebrow">Current Round</p>
            <h1 id="phase-title">Bidding</h1>
          </div>
          <div class="stats">
            <label class="live-probability-toggle" title="Show or hide model action probabilities">
              <input id="live-probabilities" type="checkbox" />
              <span>Probabilities</span>
            </label>
            <span id="round-pill" class="pill">Round</span>
            <span id="trump-pill" class="pill">Trump</span>
            <span id="hand-pill" class="pill">Cards</span>
            <span id="turn-pill" class="pill strong">Turn</span>
          </div>
        </header>

        <section id="schedule" class="schedule" aria-label="Game schedule"></section>

        <section class="layout">
          <aside class="panel players-panel">
            <div class="panel-head">
              <h2>Players</h2>
              <button id="new-round" class="icon-button" title="Start another game">↻</button>
            </div>
            <div id="players" class="players"></div>
          </aside>

          <section class="play-area">
            <div class="panel trick-panel">
              <div class="panel-head">
                <h2>Current Trick</h2>
                <span id="leader-label" class="subtle"></span>
              </div>
              <div id="trick" class="trick"></div>
            </div>

            <div id="action-panel" class="panel action-panel"></div>

            <div class="panel hand-panel">
              <div class="panel-head">
                <h2>Your Hand</h2>
                <span id="legal-hint" class="subtle"></span>
              </div>
              <div id="hand" class="hand"></div>
            </div>
          </section>

          <aside class="panel log-panel">
            <div class="panel-head">
              <h2>Scoreboard</h2>
            </div>
            <div id="scoreboard" class="scoreboard"></div>
            <div class="panel-head history-head">
              <h2>Round Results</h2>
            </div>
            <div id="round-results" class="round-results"></div>
            <div class="panel-head history-head">
              <h2>History</h2>
            </div>
            <div id="messages" class="messages"></div>
            <div id="events" class="events"></div>
          </aside>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
